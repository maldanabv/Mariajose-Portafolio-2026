<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | MJ Digital Studio</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-box: #666666;
            --accent-orange: hwb(353 18% 55%);
        }
        body { background-color: var(--bg-main); color: #333; overflow-x: hidden; }
        .navbar { background: #fff; border-bottom: 1px solid #eee; }
        .portfolio-section { padding: 100px 8%; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 60px; color: var(--accent-orange); }
        .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        .work-card { position: relative; border-radius: 20px; overflow: hidden; height: 400px; background: var(--bg-box); border: none; }
        .work-card:hover { transform: scale(1.02); transition: 0.3s; }
        .work-card .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); text-align: left; color: white; }
        .work-card h3 { margin-bottom: 5px; font-size: 1.5rem; }
        .work-card p { margin: 0; opacity: 0.9; }
        .navbar a { text-decoration: none; color: #333; font-weight: 500; transition: 0.3s; }
        .navbar a:hover { color: var(--accent-orange); }
        .btn-talk { background: #333; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .btn-talk:hover { background: var(--accent-orange); transform: translateY(-2px); }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">MJ Digital Studio</div>
        <nav><ul><li><a href="index.html">Inicio</a></li></ul></nav>
        <button class="btn-talk" onclick="window.self.close()">Cerrar Ventana</button>
    </header>
    <main class="portfolio-section">
        <h1 class="hero-title">Mi Portafolio</h1>
        <div class="portfolio-grid">
            <div class="work-card" style="background-image: url('ig-coca-cola.png'); background-size: cover; background-position: center;">
                <div class="overlay">
                    <h3>Publicidad</h3>
                    <p>poster</p>
                </div>
            </div>
            <div class="work-card" style="background-image: url('juego-perroo.webp'); background-size: cover; background-position: center;">
                <div class="overlay">
                    <h3>Personajes 3d</h3>
                    <p>video juegos</p>
                </div>
            </div>
            <div class="work-card" style="background-image: url('kantaraa.png'); background-size: cover; background-position: center;">
                <div class="overlay">
                    <h3>Kantara</h3>
                    <p>Design UX/UI</p>
                </div>
            </div>
            <div class="work-card" style="background-image: url('creacion.jpg'); background-size: cover; background-position: center;">
                <div class="overlay">
                    <h3>Creación de Contenido</h3>
                    <p>Contenido Estratégico</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
