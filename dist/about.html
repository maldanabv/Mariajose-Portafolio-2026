<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Mí | MJ Digital Studio</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-box: #666666;
            --accent-orange: hwb(353 18% 55%);
        }
        body { background-color: var(--bg-main); color: #333; }
        .navbar { background: #fff; border-bottom: 1px solid #eee; }
        .aboutme-section { padding: 100px 8%; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; }
        .bio-text { max-width: 800px; font-size: 1.4rem; color: #666; margin: 0 auto; }
        .stats-container { display: flex; justify-content: center; gap: 40px; margin-top: 60px; }
        .stat-item { background: var(--bg-box); color: white; padding: 40px; border-radius: 20px; flex: 1; max-width: 250px; }
        .stat-item h3 { font-size: 3rem; color: var(--accent-orange); margin-bottom: 10px; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">MJ Digital Studio</div>
        <nav><ul><li><a href="index.html">Inicio</a></li></ul></nav>
        <button class="btn-talk" onclick="window.close()">Cerrar</button>
    </header>
    <main class="aboutme-section">
        <h1 class="hero-title">SOBRE <span style="color: var(--accent-orange);">MÍ</span></h1>
        <p class="bio-text">
            Soy una <span style="color: var(--accent-orange);">creadora digital</span> que cree en el poder del diseño para transformar realidades. Mi enfoque combina la precisión técnica con la libertad creativa.
        </p>
        <div class="stats-container">
            <div class="stat-item"><h3>50+</h3><p>HISTORIAS CONTADAS</p></div>
            <div class="stat-item"><h3>20+</h3><p>MARCAS POTENCIADAS</p></div>
        </div>
    </main>
</body>
</html>
