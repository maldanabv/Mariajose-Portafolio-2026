<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | MJ Digital Studio</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-box: #666666;
            --accent-orange: hwb(353 18% 55%);
        }
        body { background-color: var(--bg-main); color: #333; overflow-x: hidden; }
        .navbar { background: #fff; border-bottom: 1px solid #eee; }
        .portfolio-section { padding: 100px 8%; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 60px; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        .work-card { position: relative; border-radius: 20px; overflow: hidden; height: 400px; background: var(--bg-box); border: none; }
        .work-card:hover { transform: scale(1.02); transition: 0.3s; }
        .work-card .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.8)); text-align: left; color: white; }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="logo">MJ Digital Studio</div>
        <nav><ul><li><a href="index.html">Inicio</a></li></ul></nav>
        <button class="btn-talk" onclick="window.close()">Cerrar</button>
    </header>
    <main class="portfolio-section">
        <h1 class="hero-title">EL <span style="color: var(--accent-orange);">PORTAFOLIO</span></h1>
        <div class="portfolio-grid">
            <div class="work-card"><div class="overlay"><h3>Proyecto Alpha</h3><p>Branding & UI/UX</p></div></div>
            <div class="work-card"><div class="overlay"><h3>Campaña Phoenix</h3><p>Dirección Creativa</p></div></div>
            <div class="work-card"><div class="overlay"><h3>Studio V</h3><p>Motion Graphics</p></div></div>
            <div class="work-card"><div class="overlay"><h3>Digital Soul</h3><p>Contenido Estratégico</p></div></div>
        </div>
    </main>
</body>
</html>
