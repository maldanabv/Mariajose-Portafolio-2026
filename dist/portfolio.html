<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | MJ Digital Studio (Dark Edition)</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --accent-orange: #FF4D29;
        }
        body { background-color: var(--bg-dark); color: #ffffff; overflow-x: hidden; }
        .navbar { background: rgba(15, 15, 15, 0.95); border-bottom: 1px solid #333; }
        .portfolio-dark { padding: 100px 8%; text-align: center; }
        .hero-title-dark { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; margin-bottom: 60px; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
        .work-card { position: relative; border-radius: 20px; overflow: hidden; height: 400px; background: #222; border: 1px solid #333; }
        .work-card:hover { border-color: var(--accent-orange); }
        .work-card .overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 40px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); text-align: left; }
        .grid-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 40px 40px; opacity: 0.2; z-index: -1; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <header class="navbar">
        <div class="logo">MJ Digital Studio</div>
        <nav><ul><li><a href="index.html" style="color: #ccc;">Inicio</a></li></ul></nav>
        <button class="btn-talk" onclick="window.close()">Cerrar Ventana</button>
    </header>
    <main class="portfolio-dark">
        <h1 class="hero-title-dark">EL <span style="color: var(--accent-orange);">PORTAFOLIO</span></h1>
        <div class="portfolio-grid">
            <div class="work-card"><div class="overlay"><h3>Proyecto Alpha</h3><p>Branding & UI/UX</p></div></div>
            <div class="work-card"><div class="overlay"><h3>Campaña Phoenix</h3><p>Dirección Creativa</p></div></div>
            <div class="work-card"><div class="overlay"><h3>Studio V</h3><p>Motion Graphics</p></div></div>
            <div class="work-card"><div class="overlay"><h3>Digital Soul</h3><p>Contenido Estratégico</p></div></div>
        </div>
    </main>
</body>
</html>
